<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sun Life Metaverse</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Top Bar -->
    <div id="topBar">
        <div id="logoTitle">
            <h1>Sun Life Metaverse</h1>
        </div>
        <div id="searchWrapper">
            <input type="text" id="roomInput" placeholder="Search room (e.g. RL_01S001)">
            <select id="roomDropdown" size="5"></select>
        </div>
        <div id="selectedRoomName">Select a room</div>
    </div>

    <!-- Spinner Overlay -->
    <div id="spinner">
        <div class="loader"></div>
    </div>

    <!-- Babylon.js Canvas -->
    <canvas id="renderCanvas"></canvas>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="app.js"></script>

</body>

</html>
